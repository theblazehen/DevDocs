name: Build and Push Docker Images to GHCR

on:
  push:
    branches:
      - main
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  IMAGE_PREFIX: ${{ github.repository_owner }}/devdocs

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # Build and push Frontend image
      - name: Build and push frontend image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: docker/dockerfiles/Dockerfile.frontend
          push: true
          tags: |
            ghcr.io/${{ env.IMAGE_PREFIX }}-frontend:latest
            ghcr.io/${{ env.IMAGE_PREFIX }}-frontend:${{ github.sha }}

      # Build and push Backend image
      - name: Build and push backend image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: docker/dockerfiles/Dockerfile.backend
          push: true
          tags: |
            ghcr.io/${{ env.IMAGE_PREFIX }}-backend:latest
            ghcr.io/${{ env.IMAGE_PREFIX }}-backend:${{ github.sha }}

      # Build and push MCP image
      - name: Build and push mcp image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: docker/dockerfiles/Dockerfile.mcp
          push: true
          tags: |
            ghcr.io/${{ env.IMAGE_PREFIX }}-mcp:latest
            ghcr.io/${{ env.IMAGE_PREFIX }}-mcp:${{ github.sha }}

# Notes:
# - This workflow builds and pushes Docker images for frontend, backend, and mcp to GHCR.
# - Images are tagged with both 'latest' and the commit SHA.
# - Requires repository to have GitHub Packages permissions enabled.
# - For multi-arch builds or additional tags, extend the build-push-action configuration.